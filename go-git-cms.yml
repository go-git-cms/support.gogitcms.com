# yaml-language-server: $schema=https://app.gogitcms.com/schemas/go-git-cms.json
# GoGitCMS schema configuration
# See: https://docs.gogitcms.com/schema

version: 1
contentModels:
  - name: issues
    path: "src/content/issues/*.md"
    format: markdown
    frontmatter_format: yaml
    markdown_flavor: gfm
    fields:
      - name: title
        type: string
        required: true
        entry_title: true
      - name: description
        type: string
        required: true
      - name: date
        type: string
        required: true
      - name: cms_version
        type: string
      - name: type
        type: string
        enum:
          - question
          - bug
          - other
        display:
          component: select
